---
layout: default
---
<section class="project-detail">
  <div class="container">
    <a href="/#projects" class="back-link">&larr; back to projects</a>
    <h1>{{ page.title }}</h1>
    <div class="project-meta">
      <span class="tag">{{ page.stack }}</span>
      <span class="tag">{{ page.role }}</span>
    </div>
    <div class="project-body">
      {{ content }}
    </div>
    {% if page.github %}
    <a href="{{ page.github }}" class="btn" target="_blank">View on GitHub &rarr;</a>
    {% endif %}
    {% if page.live %}
    <a href="{{ page.live }}" class="btn btn-outline" target="_blank">Live Demo &rarr;</a>
    {% endif %}
  </div>
</section>
